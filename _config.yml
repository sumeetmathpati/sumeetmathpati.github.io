title: Sumeet's blog
email: sumeet.mathpati@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  A simple and minimal jekyll theme.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://sumeetmathpati.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  sumeetmathpati
permalink: /:title/
include: ["_pages"]
google_analytics_id: "UA-178663162-1" # Example, UA-**********-*
favicon: "./logo.png" # relative path to site's favicon
goat_counter: "sumeet" # put your GoatCounter name if you want to use GoatCounter analytics

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate


# Pagination 
paginate: 5
paginate_path: /page:num/

jekyll-archives:
  enabled:
    all
  layout: 'archive'
  permalinks:
    year: '/:year/'
    month: '/:year/:month/'
    day: '/:year/:month/:day/'
    tag: '/tag/:name/'
    category: '/category/:name/'