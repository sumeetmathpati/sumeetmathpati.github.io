<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">

{%- include head.html -%}

<body>

    <main class="page-content" aria-label="Content">

        <div class="wrapper">

            <ul id="navbar">
                <li class="navbar-item" id="site-name"><a href="{{ site.baseurl }}/index.html">{{ site.title }}</a></li>
                <li class="navbar-item"><a href="{{ site.baseurl }}/about.html">About</a></li>
                <li class="navbar-item"><a href="{{ site.baseurl }}/contact.html">Contact</a></li>
            </ul>

            {{ content }}

            <p>&copy; 2020 {{ site.title }}</p>

            <hr>

        </div>
    </main>

    {% if site.goat_counter and jekyll.environment == "production" %}
    {% include goat_counter.html %}
    {% endif %}

</body>

</html>
